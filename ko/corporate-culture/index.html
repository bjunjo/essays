<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일본식 vs 미국식: 급변하는 한국 기업문화 — 빌리조</title>
  <meta name="description" content="2030세대는 어떻게 대비해야 하나" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Serif KR', 'Apple SD Gothic Neo', Georgia, serif; }

    /* ── TOKENS ── */
    :root {
      --bg:      #f9f7f2;
      --text:    #1c1c1c;
      --muted:   #888;
      --border:  #e2ddd5;
      --max:     600px;
      --text-xs:   0.7rem;
      --text-sm:   0.8rem;
      --text-base: 1rem;
      --text-name: 1.2rem;
      --space-1: 0.5rem;
      --space-2: 1rem;
      --space-3: 1.5rem;
      --space-4: 2.5rem;
      --space-5: 4rem;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      background: var(--bg);
      color: var(--text);
      line-height: 1.85;
      padding: 0 var(--space-3);
      overflow-x: hidden;
    }
    a {
      color: var(--text);
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 3px;
    }
    a:hover { text-decoration-color: var(--text); }
    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: var(--space-4) 0 var(--space-5);
    }
        /* ── HEADER ── */
    header { margin-bottom: var(--space-4); }
    header h1 {
      font-size: var(--text-name);
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    header h1 a {
      text-decoration: none;
      color: var(--text);
    }
    header h1 a:hover { opacity: 0.7; }
    nav {
      margin-top: var(--space-2);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      font-family: 'Inter', sans-serif;
      font-size: var(--text-xs);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    nav a { text-decoration: none; color: var(--muted); }
    nav a:hover, nav a.active { color: var(--text); }
    /* ── ESSAY HEADER ── */
    .essay-header { margin-bottom: var(--space-4); }
    .essay-header .date {
      font-family: 'Inter', sans-serif;
      font-size: var(--text-xs);
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: var(--space-1);
    }
    .essay-header h1 {
      font-size: 1.4rem;
      font-weight: 500;
      line-height: 1.35;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .essay-header .subtitle {
      font-size: var(--text-base);
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
    }
    /* ── BODY TEXT ── */
    .essay-body p {
      font-size: var(--text-base);
      line-height: 1.9;
      margin-bottom: 1.4rem;
    }
    .essay-body p:last-child { margin-bottom: 0; }
    .essay-body h2 {
      font-size: 1rem;
      font-weight: 500;
      margin: 2rem 0 0.8rem;
      letter-spacing: -0.01em;
    }
    .essay-body blockquote {
      border-left: 2px solid var(--border);
      padding-left: var(--space-2);
      color: var(--muted);
      font-style: italic;
      margin: 1.5rem 0;
    }
    /* ── TRANSLATE NOTICE ── */
    .translate-notice {
      font-family: 'Inter', sans-serif;
      font-size: var(--text-xs);
      color: var(--muted);
      margin-bottom: var(--space-4);
      padding: 0.6rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .translate-notice a { color: var(--muted); font-size: var(--text-xs); }
    .translate-notice a:hover { color: var(--text); }
    /* ── FOOTER ── */
    footer {
      margin-top: var(--space-5);
      padding-top: var(--space-3);
      border-top: 1px solid var(--border);
      font-family: 'Inter', sans-serif;
      font-size: var(--text-xs);
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-1);
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
    /* ── ESSAY LIST (index pages) ── */
    .essay-list { list-style: none; margin-bottom: var(--space-5); }
    .essay-list li {
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border);
    }
    .essay-list li:first-child { border-top: 1px solid var(--border); }
    .essay-list .meta {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: var(--text-xs);
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .essay-list .title { font-size: var(--text-base); line-height: 1.5; }
    .essay-list .title a { text-decoration: none; }
    .essay-list .title a:hover { text-decoration: underline; text-decoration-color: var(--text); }
    .essay-list .subtitle {
      font-size: var(--text-sm);
      color: var(--muted);
      font-style: italic;
      margin-top: 0.15rem;
      line-height: 1.5;
    }
    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: var(--space-2);
    }
    /* ── DESKTOP ENHANCEMENT ── */
    @media (min-width: 640px) {
      body { padding: 0 var(--space-4); }
      .essay-list li { display: flex; align-items: baseline; gap: var(--space-2); }
      .essay-list .meta { white-space: nowrap; min-width: 80px; margin-bottom: 0; }
      .essay-list .title { flex: 1; }
    }

  </style>
</head>
<body>
<div class="page">

  <header>
    <h1><a href="/essays/">빌리조</a></h1>
    <nav>
      <a href="/essays/">글</a>
      <a href="/essays/about/">소개</a>
      <a href="/essays/en/">English</a>
    </nav>
  </header>

  <div class="essay-header">
    <div class="date">2025년 2월</div>
    <h1>일본식 vs 미국식: 급변하는 한국 기업문화</h1>
    <p class="subtitle">2030세대는 어떻게 대비해야 하나</p>
  </div>

  <div class="translate-notice">
    This essay is written in Korean. <a href="https://translate.google.com/translate?sl=ko&tl=en&u=https://bjunjo.com/ko/corporate-culture/">Translate with Google →</a>
  </div>

  <div class="essay-body">
    <p>글이 곧 올라옵니다.</p>
  </div>

  <footer>
    <a href="/essays/">← 모든 글</a>
    <a href="mailto:reply@bjunjo.com">reply@bjunjo.com</a>
  </footer>

</div>
</body>
</html>
